name: Build Custom OpenSCAD WASM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        
    - name: Build OpenSCAD WASM
      run: |
        # Use simple make target
        make build PTHREAD=0 ENV=release
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openscad-wasm-artifacts
        path: |
          build/openscad.wasm.js
          build/openscad.wasm
          build/openscad.fonts.js
